<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="social-title social-description">
  <title id="social-title">Cely: Every concern, clearly carried</title>
  <desc id="social-description">Cely connects patient wording, supporting evidence, and a reviewed action.</desc>
  <defs>
    <style>
      .display { font-family: "Newsreader", "Noto Serif", Georgia, serif; }
