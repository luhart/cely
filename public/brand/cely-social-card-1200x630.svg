  <text x="1128" y="91" class="body" font-size="16" fill="#4c4353" text-anchor="end">Governed clinical workflow intelligence</text>
  <line x1="72" y1="166" x2="1128" y2="166" stroke="#d8d0db"/>

  <text x="72" y="281" class="display" font-size="78" font-weight="600" letter-spacing="-1.6" fill="#21182b">Every concern,</text>
