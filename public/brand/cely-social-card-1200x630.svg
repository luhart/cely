  <text x="1128" y="530" class="body" font-size="16" font-weight="600" fill="#13715b" text-anchor="end">Reviewed action</text>
  <text x="72" y="583" class="body" font-size="17" fill="#4c4353">Understanding, carried safely into care</text>
